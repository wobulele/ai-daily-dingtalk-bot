name: Push AI Daily To DingTalk

on:
  schedule:
    - cron: "0 1,2,3,4 * * *"
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force send even if the latest item was already pushed"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Push latest AI daily to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_push }}" = "true" ]; then
            export FORCE_PUSH=1
            echo "FORCE_PUSH enabled for manual dispatch."
          fi
          node src/index.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update sent AI daily state"
          git push
